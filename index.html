<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>ITATS Nexus Monitoring</title>
    <style>
      /* --- Instant Bootscreen Styles --- */
      #bootscreen-overlay {
        position: fixed;
        inset: 0;
        z-index: 999999;
        background: #050505;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        transition: opacity 0.8s ease-out;
        overflow: hidden;
        user-select: none;
        pointer-events: none;
      }

      .bs-glow-1 {
        position: absolute;
        width: 500px;
        height: 500px;
        background: rgba(16, 185, 129, 0.08);
        border-radius: 50%;
        filter: blur(120px);
        animation: glow-pulse 4s ease-in-out infinite;
      }

      .bs-logo-box {
        position: relative;
        width: 112px;
        height: 112px;
        background: linear-gradient(45deg, rgba(16, 185, 129, 0.2), rgba(124, 58, 237, 0.2));
        border-radius: 40px;
        padding: 2px;
        margin-bottom: 48px;
        box-shadow: 0 0 30px rgba(16, 185, 129, 0.15);
      }

      .bs-logo-inner {
        width: 100%;
        height: 100%;
        background: #0A0A0A;
        border-radius: 38px;
        display: flex;
        align-items: center;
        justify-content: center;
        border: 1px solid rgba(255, 255, 255, 0.1);
      }

      #bs-logo-img {
        width: 80px;
        height: 80px;
        object-fit: contain;
        animation: rotate-3d 4s linear infinite;
      }

      .bs-ring {
        position: absolute;
        inset: -32px;
        border: 1px dashed rgba(16, 185, 129, 0.1);
        border-radius: 50%;
        animation: spin-forward 8s linear infinite;
      }

      .bs-ring-outer {
        position: absolute;
        inset: -64px;
        border: 1px solid rgba(124, 58, 237, 0.05);
        border-radius: 50%;
        animation: spin-backward 12s linear infinite;
      }

      .bs-text {
        text-align: center;
        margin-bottom: 32px;
      }

      .bs-title {
        color: white;
        font-family: sans-serif;
        font-size: 20px;
        font-weight: bold;
        letter-spacing: 0.2em;
        text-transform: uppercase;
        margin: 0;
      }

      .bs-subtitle {
        color: #52525b;
        font-family: monospace;
        font-size: 10px;
        letter-spacing: 0.2em;
        text-transform: uppercase;
        margin-top: 8px;
      }

      .bs-progress-container {
        width: 256px;
        height: 4px;
        background: rgba(255, 255, 255, 0.05);
        border-radius: 99px;
        border: 1px solid rgba(255, 255, 255, 0.05);
        overflow: hidden;
      }

      .bs-progress-bar {
        height: 100%;
        background: linear-gradient(90deg, #10b981, #7c3aed);
        width: 0%;
        box-shadow: 0 0 10px rgba(16, 185, 129, 0.5);
        animation: progress-load 3s cubic-bezier(0.4, 0, 0.2, 1) forwards;
      }

      @keyframes rotate-3d {
        from { transform: perspective(1000px) rotateY(0deg); }
        to { transform: perspective(1000px) rotateY(360deg); }
      }
      @keyframes spin-forward {
        from { transform: rotate(0deg); }
        to { transform: rotate(360deg); }
      }
      @keyframes spin-backward {
        from { transform: rotate(360deg); }
        to { transform: rotate(0deg); }
      }
      @keyframes glow-pulse {
        0%, 100% { transform: scale(1); opacity: 0.5; }
        50% { transform: scale(1.2); opacity: 0.8; }
      }
      @keyframes progress-load {
        0% { width: 0%; }
        100% { width: 100%; }
      }
    </style>
  </head>
  <body>
    <!-- Instant Bootscreen Layer -->
    <div id="bootscreen-overlay">
      <div class="bs-glow-1"></div>
      <div class="bs-logo-box">
        <div class="bs-ring"></div>
        <div class="bs-ring-outer"></div>
        <div class="bs-logo-inner">
          <img id="bs-logo-img" src="/logo.png" alt="Logo" onerror="this.style.display='none'">
        </div>
      </div>
      <div class="bs-text">
        <h1 class="bs-title">ITATS <span style="color: #10b981">NEXUS</span></h1>
        <p class="bs-subtitle">Security & Network Monitoring System</p>
      </div>
      <div class="bs-progress-container">
        <div class="bs-progress-bar"></div>
      </div>
    </div>

    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
